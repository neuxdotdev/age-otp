# cbindgen.toml
header = """
/*
 * age-otp C FFI Header
 * Auto-generated by cbindgen. Do not edit manually.
 */
"""
include_guard = "AGE_OTP_H"
language = "C"
style = "both"

[parse]
parse_deps = false

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[export]
prefix = "otp_"
include = ["OtpEngine", "OtpCode", "OtpSeed", "OtpErrorCode", "CCharset"]

[defines]
"target_os = linux" = "OS_LINUX"
"target_os = macos" = "OS_MACOS"